services:
  postgres:
    image: postgres:16-alpine
    container_name: exampro-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: exam_proctoring
    ports:
      - "5432:5432"
    volumes:
      - exampro_data:/var/lib/postgresql/data

volumes:
  exampro_data:
